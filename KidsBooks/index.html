<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Z is for Zebra — A Little Book</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;800&display=swap');

  :root{
    --sun:#FFD34E;
    --coral:#FF6F59;
    --teal:#2EC4B6;
    --plum:#6A4C93;
    --ink:#1B1B3A;
    --paper:#FFFFFF;
    --cream:#FFF8ED;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    height:100%;
    background:var(--cream);
    font-family:'Nunito',sans-serif;
    overflow:hidden;
  }

  .stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .book{
    position:relative;
    width:min(94vw,560px);
    height:min(88vh,720px);
    background:var(--paper);
    border-radius:28px;
    box-shadow:0 20px 50px rgba(27,27,58,0.18);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .badge{
    position:absolute;
    top:18px;
    left:18px;
    width:52px;
    height:52px;
    border-radius:16px;
    background:var(--plum);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:26px;
    z-index:5;
    box-shadow:0 6px 14px rgba(106,76,147,0.35);
  }

  .pagecount{
    position:absolute;
    top:18px;
    right:18px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--ink);
    background:var(--sun);
    padding:8px 14px;
    border-radius:20px;
    z-index:5;
  }

  .art-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--paper);
    padding:60px 30px 10px 30px;
  }

  .art-wrap svg{
    width:100%;
    height:100%;
    max-width:420px;
    max-height:420px;
  }

  .caption{
    padding:8px 28px 28px 28px;
    text-align:center;
  }

  .caption h1{
    font-family:'Fredoka',sans-serif;
    font-size:clamp(22px,6vw,30px);
    font-weight:700;
    color:var(--ink);
    margin:0 0 6px 0;
    letter-spacing:0.2px;
  }

  .caption .zword{
    color:var(--coral);
  }

  .caption p{
    margin:0;
    font-size:14px;
    color:#8A8AA3;
    font-weight:600;
  }

  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px 20px 20px;
  }

  .navbtn{
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    background:var(--teal);
    color:#fff;
    font-family:'Fredoka',sans-serif;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s ease, background 0.15s ease;
    box-shadow:0 6px 14px rgba(46,196,182,0.35);
  }
  .navbtn:hover{transform:translateY(-2px) scale(1.05);}
  .navbtn:disabled{
    background:#D8D8E4;
    box-shadow:none;
    cursor:default;
    transform:none;
  }

  .dots{
    display:flex;
    gap:8px;
  }
  .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:#E3E3EE;
    transition:background 0.2s ease, transform 0.2s ease;
    cursor:pointer;
  }
  .dot.active{
    background:var(--coral);
    transform:scale(1.3);
  }

  @media (prefers-reduced-motion: reduce){
    .navbtn, .dot{transition:none;}
  }
</style>
</head>
<body>

      <p id="sub">tap → to turn the page</p>

    <div class="nav">
      <button class="navbtn" id="prev" aria-label="Previous page">&#8592;</button>
      <div class="dots" id="dots"></div>

let idx = 0;
const artEl = document.getElementById('art');
const sentEl = document.getElementById('sentence');
const countEl = document.getElementById('pagecount');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

function buildDots(){
  dotsEl.innerHTML = '';
  pages.forEach((p,i)=>{
    const d = document.createElement('div');
    d.className = 'dot' + (i===idx ? ' active' : '');
    d.addEventListener('click', ()=>{ idx = i; render(); });
    dotsEl.appendChild(d);
  });
}

function render(){
  artEl.innerHTML = pages[idx].svg;
  sentEl.innerHTML = pages[idx].sentence;
  countEl.textContent = (idx+1) + ' / ' + pages.length;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === pages.length - 1;
  buildDots();
}

prevBtn.addEventListener('click', ()=>{ if(idx>0){ idx--; render(); } });
nextBtn.addEventListener('click', ()=>{ if(idx<pages.length-1){ idx++; render(); } });
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight' && idx < pages.length-1){ idx++; render(); }
  if(e.key === 'ArrowLeft' && idx > 0){ idx--; render(); }
});

render();
</script>

</html>
